version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    assignees:
      - "omarkohl"
    groups:
      all-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 10
    ignore:
      # eslint-plugin-react not yet compatible with eslint 10 (issue #45)
      - dependency-name: "eslint"
        versions: [">= 10"]
      - dependency-name: "@eslint/js"
        versions: [">= 10"]
      # typescript-eslint not yet compatible with typescript 7 (issue #76)
      - dependency-name: "typescript"
        versions: [">= 7"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    assignees:
      - "omarkohl"
    groups:
      all-actions:
        patterns:
          - "*"
